syntax = "proto3";
package esriPBuffer.graph;
option java_package = "com.esri.arcgis.protobuf.graph";
option optimize_for = LITE_RUNTIME;
option cc_enable_arenas = true;

// The format in which the data will be exported.
enum ExportDataFormat {
  UNSUPPORTED_EXPORT_DATA_FORMAT = 0;

  // GeoParquet export format.
  // If not specified by the user, this format will be used as the default.
  EXPORT_DATA_FORMAT_GEOPARQUET = 1;
}

// Statistics capturing the number of items involved in a data transfer.
// The semantics of the counts differ depending on whether the operation
// is an export or an import:
//
// For export operations:
//   - source_count: Total number of entities or relationships present in the Knowledge Graph service.
//   - transferred_count: Number of entities or relationships successfully exported to the output format.
//
// For import operations:
//   - source_count: Total number of entities or relationships available in the source data (e.g., a .sd file).
//   - transferred_count: Number of entities or relationships successfully imported into the Knowledge Graph service.
message DataTransferStats {
  uint64 source_count = 1;
  uint64 transferred_count = 2;
}
