syntax = "proto3";
package esriPBuffer.graph;
option java_package = "com.esri.arcgis.protobuf.graph";
option optimize_for = LITE_RUNTIME;
option cc_enable_arenas = true;

import "esriPBuffer/EsriTypes.proto";
import "esriPBuffer/graph/EsriGraphTypes.proto";

// ../KnowledgeGraphServer/graph/query

message GraphQueryResultHeader {
  uint64 data_model_timestamp = 1;   // UTC UNIX epoch in milliseconds.

  Error error = 3;                   // Error that occurred during query parsing or execution.
  repeated Error warnings = 7;       // Warnings that occurred during query parsing or execution.

  Transform transform = 2;           // Transformation parameters for client to decode geometries.
  EsriTypes.SpatialReference sr = 6; // Spatial reference of the returned geometries.

  repeated string field_names = 4;   // Well-ordered field names in the result set.
  bool compressed_frames = 5;        // Indicates whether the GraphQueryResultFrames are compressed.
}

message GraphQueryRow {
	repeated AnyValue values = 1;
}

message GraphQueryResultFrame {
	Error error = 1;
	repeated GraphQueryRow rows = 2;

	// `exceeded_transfer_limit` property can only be set on the last frame of the graph query response.
	bool exceeded_transfer_limit = 3;
}
