syntax = "proto3";
package esriPBuffer.graph;
option java_package = "com.esri.arcgis.protobuf.graph";
option optimize_for = LITE_RUNTIME;
option cc_enable_arenas = true;

import "esriPBuffer/graph/DataTransferTypes.proto";

// Request parameters for exporting a Knowledge Graph service as a
// Service Definition (SD) portal item. This message is specific to
// the "export as service definition" format.
//
// The exported Service Definition bundles together:
//   - Portal item info
//   - Service manifest xml
//   - Service configuration json file
//   - Knowledge Graph service data model
//   - Graph data
//
// This packaging enables publishing a new knowledge graph service using the existing publish operation in sharing API.
message ExportServiceDefinitionRequest {
  // The name of the exported Service Definition (.sd) file.
  //
  // If not specified, a unique name will be automatically generated
  // and returned in the ExportServiceDefinitionResult using the
  // format: `<ServiceName>_SD_<JobId>`, where:
  //   - <ServiceName> is the Knowledge Graph service name.
  //   - <JobId> is the identifier of the asynchronous export job.
  //
  // The inclusion of the JobId ensures uniqueness and traceability
  // for each export request.
  optional string service_definition_name = 1;

  // The data format used within the Service Definition package
  // (e.g., GeoParquet). Determines how the graph data and schema
  // are serialized.
  ExportDataFormat data_format = 2;
}
