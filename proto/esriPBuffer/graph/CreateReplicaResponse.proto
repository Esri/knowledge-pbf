syntax = "proto3";
package esriPBuffer.graph;
option java_package = "com.esri.arcgis.protobuf.graph";
option optimize_for = LITE_RUNTIME;
option cc_enable_arenas = true;

import "esriPBuffer/graph/EsriGraphTypes.proto";
import "esriPBuffer/graph/SyncTypes.proto";

// ../KnowledgeGraphServer/replicas/create

message CreateReplicaResponse {
  Error error = 1;  // To be used in case there was a non-replica-specific reason for the failure.

  oneof result {
    string async_status_url = 2;
    CreateReplicaResult create_replica_result = 3;
  }
}

message CreateReplicaResult {
  repeated Error errors = 1;
  repeated Error warnings = 2;

  string replica_name = 3;                // The name of the replica. May differ from the `requested_replica_name`
  string requested_replica_name = 4;      // The requested name of the replica in `CreateReplicaRequest`
  bytes replica_id = 5;                   // 16-byte RFC4122 UUID
  int64 sync_date = 6;                    // UTC UNIX timestamp in milliseconds since epoch.

  SyncDataFormat replica_data_format = 7; // The data format of the replica file.
  oneof replica_data {
    string replica_data_url = 8;          // URL to download replica data.
  }
}
