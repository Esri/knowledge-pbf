syntax = "proto3";
package esriPBuffer.graph;
option java_package = "com.esri.arcgis.protobuf.graph";
option optimize_for = LITE_RUNTIME;
option cc_enable_arenas = true;

import "esriPBuffer/graph/ExportServiceDefinitionRequest.proto";

// ../KnowledgeGraphServer/dataTransfer/export

// A generic export request that defines the type of export operation to perform.
// This abstraction provides flexibility to support multiple export packaging
// formats and strategies as the system evolves.
//
// Current behavior:
//   - Supports ExportServiceDefinitionRequest, which packages the portal item
//     info, Knowledge Graph service data model, and graph data into Esri�s
//     standard Service Definition (.sd) file format.
message ExportRequest {
  oneof export_request_type {
    // Export the Knowledge Graph service as a Service Definition (.sd) file.
    ExportServiceDefinitionRequest export_service_definition = 1;
  }
}
